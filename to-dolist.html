<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Modern To-Do App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
}

.container{
    width:400px;
    padding:30px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.1);
}

h1{
    text-align:center;
    color:white;
    margin-bottom:25px;
    font-size:32px;
    font-weight:600;
}

.input-box{
    display:flex;
    gap:12px;
    margin-bottom:25px;
}

.input-box input{
    flex:1;
    padding:15px;
    border:none;
    outline:none;
    border-radius:15px;
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:15px;
}

.input-box input::placeholder{
    color:#cbd5e1;
}

.input-box button{
    width:55px;
    border:none;
    border-radius:15px;
    background:#8b5cf6;
    color:white;
    font-size:28px;
    cursor:pointer;
    transition:0.3s;
}

.input-box button:hover{
    transform:scale(1.05);
    background:#7c3aed;
}

ul{
    list-style:none;
}

li{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px;
    margin-bottom:15px;
    border-radius:18px;
    background:rgba(255,255,255,0.08);
    color:white;
    animation:fade 0.3s ease;
}

.task{
    display:flex;
    align-items:center;
    gap:12px;
}

.circle{
    width:22px;
    height:22px;
    border:2px solid #8b5cf6;
    border-radius:50%;
    cursor:pointer;
    transition:0.3s;
}

.completed .circle{
    background:#8b5cf6;
}

.completed .text{
    text-decoration:line-through;
    opacity:0.6;
}

.text{
    font-size:16px;
}

.delete{
    font-size:20px;
    cursor:pointer;
    color:#f87171;
    transition:0.3s;
}

.delete:hover{
    transform:scale(1.2);
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>To-Do List</h1>

    <div class="input-box">
        <input type="text" id="input" placeholder="Add a task...">
        <button onclick="addTask()">+</button>
    </div>

    <ul id="list"></ul>

</div>

<script>

function addTask(){

    let input = document.getElementById("input");
    let text = input.value.trim();

    if(text === ""){
        alert("Enter a task");
        return;
    }

    let li = document.createElement("li");

    li.innerHTML = `
    
    <div class="task">
        <div class="circle"></div>
        <span class="text">${text}</span>
    </div>

    <div class="delete">✕</div>

    `;

    li.querySelector(".circle").onclick = function(){
        li.classList.toggle("completed");
    }

    li.querySelector(".delete").onclick = function(){
        li.remove();
    }

    document.getElementById("list").appendChild(li);

    input.value = "";

}

</script>

</body>
</html>
